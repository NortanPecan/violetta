# Optional: full self-hosted vector store for Mem0 (Qdrant).
# Run with: docker compose -f docker-compose.mem0.yml up -d
#
# Then set in .env or code:
#   MEM0_VECTOR_PROVIDER=qdrant
#   QDRANT_HOST=localhost
#   QDRANT_PORT=6333
#
# Chroma (default in long_term_memory.py) needs zero docker and works great for local laptop use.

version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: violetta-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
